<!DOCTYPE html>
<html>

<head>
    <title>JS Class</title>
</head>

<body>
    <h1>JavaScript Class</h1>
    <p id="student1"></p>
    <p id="student2"></p>
    <script>
        //Creating a class
        class student {
            constructor(name, year) {
                this.name = name;
                this.year = year;
            }
            //Age methode
            age() {
                let date = new Date();
                return date.getFullYear() - this.year;
            }
        }
        //using the class with two objects
        const student1=new student("Hafsa",2007);
        document.getElementById("student1").innerHTML="My name is"+student1.name+".I was born in "  + student1.year+".And my age is"+student1.age();

        const student2 = new student("Hina", 2006);
        document.getElementById("student2").innerHTML = "My name is" + student2.name + ".I was born in " + student2.year + ".And my age is" + student2.age();

    </script>
</body>

</html>
