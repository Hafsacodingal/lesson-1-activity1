<!DOCTYPE HTML>
<html>

<head>
    <title>Arguments</title>
</head>

<body>
    <h1>Arguments in JS</h1>
    <p id="result"></p>
    <script>
        function findMax() {
            var i;
            var Max = 0;
            for (i = 0; i < arguments.length; i++) {
                if (arguments[i] > Max) {
                    Max = arguments[i];
                }
            }
            return Max;
        }
        document.getElementById("result").innerHTML = findMax(4, 5, 6);
    </script>
</body>

</html>
