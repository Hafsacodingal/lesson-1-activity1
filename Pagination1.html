<!DOCTYPE html>
<html>

<head>
    <title>Bootstrap Pagination</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="container mt-4">

        <h2 class="text-center">Pagination</h2>

        <br>

        <!-- Simple Pagination -->
        <h4>1. Basic Pagination</h4>
        <ul class="pagination">
            <li class="page-item"><a class="page-link" href="#">Previous</a></li>
            <li class="page-item"><a class="page-link" href="#">1</a></li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
            <li class="page-item"><a class="page-link" href="#">Next</a></li>
        </ul>

        <br>

        <!-- Colored Pagination -->
        <h4>2. Colored Pagination</h4>
        <ul class="pagination">
            <li class="page-item"><a class="page-link text-primary" href="#">1</a></li>
            <li class="page-item"><a class="page-link text-success" href="#">2</a></li>
            <li class="page-item"><a class="page-link text-danger" href="#">3</a></li>
            <li class="page-item"><a class="page-link text-warning" href="#">4</a></li>
        </ul>

    </div>

</body>

</html>
