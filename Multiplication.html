<!DOCTYPE html>
<html>

<head>
  <title>Multiplication using Function</title>
</head>

<body>

  <h2>JavaScript Multiplication Function</h2>

  <p id="result"></p>

  <script>

    function multiply(a, b) {
      return a * b;
    }

    var answer = multiply(4, 5);

    document.getElementById("result").innerHTML = "The result is: " + answer;

  </script>

</body>

</html>
