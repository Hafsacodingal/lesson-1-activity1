<!DOCTYPE html>
<html>

<head>
    <title>Bootstrap Image Slider</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-4">

        <h2 class="text-center">My Image Slider</h2>

        <!-- Slider Start -->
        <div id="mySlider" class="carousel slide" data-bs-ride="carousel">

            <div class="carousel-inner">

                <div class="carousel-item active">
                    <img src="https://picsum.photos/800/300?1" class="d-block w-100">
                </div>

                <div class="carousel-item">
                    <img src="https://picsum.photos/800/300?2" class="d-block w-100">
                </div>

                <div class="carousel-item">
                    <img src="https://picsum.photos/800/300?3" class="d-block w-100">
                </div>

            </div>

            <!-- Previous Button -->
            <button class="carousel-control-prev" type="button" data-bs-target="#mySlider" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <!-- Next Button -->
            <button class="carousel-control-next" type="button" data-bs-target="#mySlider" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>

        </div>
        <!-- Slider End -->

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
