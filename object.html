<!DOCTYPE HTML>
<html>

<head>
    <title>object</title>
</head>

<body>
    <h1>Objects in JS</h1>
    <p id="demo">
        <script>
            var student = {
                RollNo: 1,
                Name: "Hafsa Yaqub",
                Class: 12,
                School: "TMS"
            }
            document.getElementById("demo").innerHTML = "My name is" + student.Name,"<br>"  +"My Roll No is" + student.RollNo, "<br>" + "I am studying in grade" + student.Class, "<br>" +"My school name is"+student.School, "<br>"
        </script>
    </p>
</body>

</html>
