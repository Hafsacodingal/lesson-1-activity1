<!DOCTYPE html>
<html>

<head>
    <title>Evaluation function </title>
</head>

<body>
    <h1>Evaluation function</h1>
    <button onclick="myFunction()">Click here</button>
    <p id="result"></p>
    <script>
        function myFunction() {
            var x = 15;
            var y = 7;
            var a = eval("x+y") + "<br>";
            var b = eval("2*2") + "<br>";
            var c = eval("y-x") + "<br>";
            var res = a + b + c;
            document.getElementById("result").innerHTML = res;

        }
    </script>

</body>

</html>
