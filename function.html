<!DOCTYPE HTML>
<html>

<head>
    <title>Function</title>
</head>

<body>
    <button onclick="hello()">Click Here</button>
    <button onclick="add(4,5)">For Addition Click Here</button>
    <button onclick="sub(4,5)">For Subtraction Click Here</button>
    <button onclick="mul(4,5)">For Multiflication Click Here</button>
    <button onclick="div(4,5)">For Division Click Here</button>
    <script>
        function hello() {
            document.write("this is the function part","<br>");
            }
        function add(a,b) {
            document.write("a+b is",(a+b),"<br>");
            }
            
        function sub(a, b) {
            document.write("a+b is", (a - b), "<br>");
            }
            
        function mul(a, b) {
                document.write("a+b is", (a * b), "<br>");
            }
            
        function div(a, b) {
                document.write("a+b is", (a / b), "<br>");
            }
        function add(a, b) {
            return a+b;
        }
        document.write(add(9,4));           
    </script>
</body>

</html
