<!DOCTYPE html>
<html>

<head>
  <title>Array in JS</title>
</head>

<body>
  <h1>Array in JS</h1>
  <script>
    var colors = ["orange", "purple", "black", "white", "blue"];
    document.write(colors, "<br>");
    document.write(colors[4], "<br>");
    document.write(colors.join("*"), "<br>");
    colors.pop()
    document.write(colors, "<br>");
    colors.unshift("pink")
    document.write(colors, "<br>");
    colors.shift()
    document.write(colors, "<br>");
    
  </script>
</body>

</html>
